apiVersion: apps/v1
kind: Deployment
metadata:
  name: working-memory
  namespace: endogenai-modules
  labels:
    app: working-memory
    app.kubernetes.io/part-of: endogenai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: working-memory
  template:
    metadata:
      labels:
        app: working-memory
    spec:
      runtimeClassName: gvisor
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: working-memory
        image: endogenai/working-memory:latest
        ports:
        - containerPort: 8201
        - containerPort: 8301
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /.well-known/agent-card.json
            port: 8201
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /.well-known/agent-card.json
            port: 8201
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 64Mi
