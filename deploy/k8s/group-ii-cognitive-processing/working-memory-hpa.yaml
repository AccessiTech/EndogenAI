apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: working-memory
  namespace: endogenai-modules
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: working-memory
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
