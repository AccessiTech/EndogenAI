apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway
  namespace: endogenai-infra
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 3001
