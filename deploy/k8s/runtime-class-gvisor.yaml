# deploy/k8s/runtime-class-gvisor.yaml
# Kubernetes RuntimeClass for gVisor (runsc) container sandbox.
# CI/production only — not used on macOS Docker Desktop (no KVM).
# Reference: https://gvisor.dev/docs/user_guide/install/
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: runsc
overhead:
  podFixed:
    memory: "64Mi"
    cpu: "250m"
scheduling:
  nodeClassification:
    tolerations:
    - key: "gvisor"
      operator: "Exists"
      effect: "NoSchedule"
