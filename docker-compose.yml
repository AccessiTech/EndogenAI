# brAIn — Docker Compose
# Local development stack: ChromaDB · Ollama · Redis · Observability
# Usage: docker compose up -d
# Override with docker-compose.override.yml for local customisation (gitignored)

services:
  # ---------------------------------------------------------------------------
  # Vector Store — ChromaDB (local default)
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/.chroma/index
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Embedding & LLM Inference — Ollama (local-first)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Session Store — Redis / Valkey (short-term memory, KV cache)
  # ---------------------------------------------------------------------------
  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["valkey-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Observability Stack
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8888:8888" # Collector metrics
    volumes:
      - ./observability/otel-collector.yaml:/etc/otel/config.yaml:ro
    command: ["--config=/etc/otel/config.yaml"]
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

# ---------------------------------------------------------------------------
# Group II Cognitive Processing Modules (profile: modules)
# Start with: docker compose --profile modules up -d
# ---------------------------------------------------------------------------
  working-memory:
    profiles: [modules]
    build:
      context: .
      dockerfile: modules/group-ii-cognitive-processing/memory/working-memory/Dockerfile
    ports:
      - "8201:8201"
      - "8301:8301"
    depends_on:
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=http://ollama:11434
      - STM_A2A_URL=http://short-term-memory:8202
      - EPISODIC_A2A_URL=http://episodic-memory:8204
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8201/.well-known/agent-card.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  short-term-memory:
    profiles: [modules]
    build:
      context: .
      dockerfile: modules/group-ii-cognitive-processing/memory/short-term-memory/Dockerfile
    ports:
      - "8202:8202"
      - "8302:8302"
    depends_on:
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - REDIS_URL=redis://redis:6379
      - LTM_A2A_URL=http://long-term-memory:8203
      - EPISODIC_A2A_URL=http://episodic-memory:8204
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8202/.well-known/agent-card.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  long-term-memory:
    profiles: [modules]
    build:
      context: .
      dockerfile: modules/group-ii-cognitive-processing/memory/long-term-memory/Dockerfile
    ports:
      - "8203:8203"
      - "8303:8303"
    depends_on:
      chromadb:
        condition: service_healthy
    volumes:
      - ltm_kuzu_data:/tmp
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - KUZU_DB_PATH=/tmp/endogenai_ltm.kuzu
      - SEED_DOCUMENTS_PATH=resources/static/knowledge/
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8203/.well-known/agent-card.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  episodic-memory:
    profiles: [modules]
    build:
      context: .
      dockerfile: modules/group-ii-cognitive-processing/memory/episodic-memory/Dockerfile
    ports:
      - "8204:8204"
      - "8304:8304"
    depends_on:
      chromadb:
        condition: service_healthy
      long-term-memory:
        condition: service_healthy
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - LTM_A2A_URL=http://long-term-memory:8203
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8204/.well-known/agent-card.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  affective:
    profiles: [modules]
    build:
      context: .
      dockerfile: modules/group-ii-cognitive-processing/affective/Dockerfile
    ports:
      - "8205:8205"
      - "8305:8305"
    depends_on:
      chromadb:
        condition: service_healthy
      working-memory:
        condition: service_healthy
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - WM_A2A_URL=http://working-memory:8201
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8205/.well-known/agent-card.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  reasoning:
    profiles: [modules]
    build:
      context: .
      dockerfile: modules/group-ii-cognitive-processing/reasoning/Dockerfile
    ports:
      - "8206:8206"
      - "8306:8306"
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - OLLAMA_URL=http://ollama:11434
      - INFERENCE_MODEL=ollama/mistral
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8206/.well-known/agent-card.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# ---------------------------------------------------------------------------
# Named Volumes
# ---------------------------------------------------------------------------
volumes:
  chroma_data:
  ollama_models:
  redis_data:
  prometheus_data:
  grafana_data:
  ltm_kuzu_data:
