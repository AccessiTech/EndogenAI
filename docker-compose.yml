# frankenbrAIn — Docker Compose
# Local development stack: ChromaDB · Ollama · Redis · Observability
# Usage: docker compose up -d
# Override with docker-compose.override.yml for local customisation (gitignored)

services:
  # ---------------------------------------------------------------------------
  # Vector Store — ChromaDB (local default)
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/.chroma/index
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Embedding & LLM Inference — Ollama (local-first)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Session Store — Redis / Valkey (short-term memory, KV cache)
  # ---------------------------------------------------------------------------
  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["valkey-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Observability Stack
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8888:8888" # Collector metrics
    volumes:
      - ./observability/otel-collector.yaml:/etc/otel/config.yaml:ro
    command: ["--config=/etc/otel/config.yaml"]
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-rules:/etc/prometheus/prometheus-rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

# ---------------------------------------------------------------------------
  # Observability — Blackbox Exporter (Phase 8 module health probes)
  # Probes each module's health endpoint via HTTP for probe_success metrics.
  # @see observability/blackbox.yml for probe config
  # @see observability/prometheus.yml for scrape config
  # ---------------------------------------------------------------------------
  blackbox:
    image: prom/blackbox-exporter:latest
    restart: unless-stopped
    ports:
      - "9115:9115"
    volumes:
      - ./observability/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    command: ["--config.file=/etc/blackbox/blackbox.yml"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9115/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

# ---------------------------------------------------------------------------
# Group II Cognitive Processing Modules (profile: modules)
# Start with: docker compose --profile modules up -d
# ---------------------------------------------------------------------------
  working-memory:
    profiles: [modules]
    build:
      context: .
      dockerfile: modules/group-ii-cognitive-processing/memory/working-memory/Dockerfile
    ports:
      - "8201:8201"
      - "8301:8301"
    depends_on:
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=http://ollama:11434
      - STM_A2A_URL=http://short-term-memory:8202
      - EPISODIC_A2A_URL=http://episodic-memory:8204
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8201/.well-known/agent-card.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  short-term-memory:
    profiles: [modules]
    build:
      context: .
      dockerfile: modules/group-ii-cognitive-processing/memory/short-term-memory/Dockerfile
    ports:
      - "8202:8202"
      - "8302:8302"
    depends_on:
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - REDIS_URL=redis://redis:6379
      - LTM_A2A_URL=http://long-term-memory:8203
      - EPISODIC_A2A_URL=http://episodic-memory:8204
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8202/.well-known/agent-card.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  long-term-memory:
    profiles: [modules]
    build:
      context: .
      dockerfile: modules/group-ii-cognitive-processing/memory/long-term-memory/Dockerfile
    ports:
      - "8203:8203"
      - "8303:8303"
    depends_on:
      chromadb:
        condition: service_healthy
    volumes:
      - ltm_kuzu_data:/tmp
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - KUZU_DB_PATH=/tmp/endogenai_ltm.kuzu
      - SEED_DOCUMENTS_PATH=resources/static/knowledge/
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8203/.well-known/agent-card.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  episodic-memory:
    profiles: [modules]
    build:
      context: .
      dockerfile: modules/group-ii-cognitive-processing/memory/episodic-memory/Dockerfile
    ports:
      - "8204:8204"
      - "8304:8304"
    depends_on:
      chromadb:
        condition: service_healthy
      long-term-memory:
        condition: service_healthy
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - LTM_A2A_URL=http://long-term-memory:8203
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8204/.well-known/agent-card.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  affective:
    profiles: [modules]
    build:
      context: .
      dockerfile: modules/group-ii-cognitive-processing/affective/Dockerfile
    ports:
      - "8205:8205"
      - "8305:8305"
    depends_on:
      chromadb:
        condition: service_healthy
      working-memory:
        condition: service_healthy
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - WM_A2A_URL=http://working-memory:8201
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8205/.well-known/agent-card.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  reasoning:
    profiles: [modules]
    build:
      context: .
      dockerfile: modules/group-ii-cognitive-processing/reasoning/Dockerfile
    ports:
      - "8206:8206"
      - "8306:8306"
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - OLLAMA_URL=http://ollama:11434
      - INFERENCE_MODEL=ollama/mistral
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8206/.well-known/agent-card.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# ---------------------------------------------------------------------------
# Phase 6 Infrastructure: Temporal Workflow Server + OPA Policy Engine
# Start with: docker compose up temporal opa -d
# ---------------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:latest
    restart: unless-stopped
    ports:
      - "7233:7233"   # Temporal gRPC (Worker + SDK)
      - "8233:8233"   # Temporal Web UI
    environment:
      - DB=sqlite
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/dynamicconfig.yaml
    volumes:
      - temporal_data:/tmp/temporal
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "localhost:7233"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  opa:
    image: openpolicyagent/opa:latest
    restart: unless-stopped
    ports:
      - "8181:8181"   # OPA REST API
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-format=json"
      - "--set=decision_logs.console=true"
      - "--bundle"
      - "/policies"   # Load Rego policy bundle from mounted volume at startup
    volumes:
      - ./modules/group-iii-executive-output/executive-agent/policies:/policies:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ---------------------------------------------------------------------------
# Group III Executive & Output Modules (profile: modules)
# Start with: docker compose --profile modules up -d
# ---------------------------------------------------------------------------
  executive-agent:
    profiles: [modules]
    build:
      context: .
      dockerfile: modules/group-iii-executive-output/executive-agent/Dockerfile
    ports:
      - "8161:8161"   # A2A JSON-RPC server
      - "8261:8261"   # MCP SSE server
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy
      opa:
        condition: service_healthy
    environment:
      - CHROMADB_URL=http://chromadb:8000
      - OLLAMA_URL=http://ollama:11434
      - OPA_URL=http://opa:8181
      - AGENT_RUNTIME_A2A_URL=http://agent-runtime:8162
      - AFFECTIVE_A2A_URL=http://affective:8205
      - WORKING_MEMORY_A2A_URL=http://working-memory:8201
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8161/.well-known/agent-card.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  agent-runtime:
    profiles: [modules]
    build:
      context: .
      dockerfile: modules/group-iii-executive-output/agent-runtime/Dockerfile
    ports:
      - "8162:8162"   # A2A JSON-RPC server
      - "8262:8262"   # MCP SSE server
    depends_on:
      temporal:
        condition: service_healthy
      ollama:
        condition: service_healthy
      executive-agent:
        condition: service_healthy
    environment:
      - TEMPORAL_URL=temporal:7233
      - OLLAMA_URL=http://ollama:11434
      - EXECUTIVE_AGENT_URL=http://executive-agent:8161
      - MOTOR_OUTPUT_URL=http://motor-output:8163
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8162/.well-known/agent-card.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  motor-output:
    profiles: [modules]
    build:
      context: .
      dockerfile: modules/group-iii-executive-output/motor-output/Dockerfile
    ports:
      - "8163:8163"   # A2A JSON-RPC server
      - "8263:8263"   # MCP SSE server
    depends_on:
      agent-runtime:
        condition: service_healthy
      executive-agent:
        condition: service_healthy
    environment:
      - EXECUTIVE_AGENT_URL=http://executive-agent:8161
      # AGENT_RUNTIME_URL is reserved for future use; motor-output currently
      # receives tasks from agent-runtime via A2A, not by calling it directly.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8163/.well-known/agent-card.json')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# ---------------------------------------------------------------------------
# Phase 8 — Hono API Gateway (BFF)
# Default: always starts with the base stack
# ---------------------------------------------------------------------------
  gateway:
    build:
      context: apps/default/server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - MCP_SERVER_URL=http://mcp:8000
      - MCP_SERVER_URI=http://localhost:8000
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3001
      - PORT=3001
      - LOG_LEVEL=info
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=hono-gateway
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

# ---------------------------------------------------------------------------
# Phase 8 — Keycloak (optional profile: keycloak)
# Start with: docker compose --profile keycloak up -d keycloak
# Production OIDC provider — replaces the JWT stub in apps/default/server/auth/
# ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    profiles: ["keycloak"]
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./apps/default/server/src/auth/keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      - "8080:8080"

# ---------------------------------------------------------------------------
# Phase 8 — Grafana Tempo (optional profile: observability-full)
# Start with: docker compose --profile observability-full up -d tempo
# Distributed trace backend for OTel spans exported by gateway + modules
# ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:latest
    profiles: ["observability-full"]
    restart: unless-stopped
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API + Grafana datasource
      - "4320:4317"   # OTLP gRPC (offset to avoid conflict with otel-collector:4317)

# ---------------------------------------------------------------------------
# Named Volumes
# ---------------------------------------------------------------------------
volumes:
  chroma_data:
  ollama_models:
  redis_data:
  prometheus_data:
  grafana_data:
  ltm_kuzu_data:
  temporal_data:
  tempo_data:
