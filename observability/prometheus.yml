# Prometheus Configuration — brAIn
# Scrapes metrics from the OTel Collector and local services.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "local"
    project: "brain"

# Alerting (wire in production — Alertmanager)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

# Rule files (add alert rules here as modules mature)
rule_files:
  - "prometheus-rules/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # OTel Collector — exported Prometheus metrics from all modules
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "brain_.*"
        action: keep

  # ChromaDB — collection sizes and query latencies
  - job_name: "chromadb"
    static_configs:
      - targets: ["chromadb:8000"]
    metrics_path: "/api/v1/metrics"

  # Redis / Valkey — memory, ops/sec
  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  # Phase 8 — Blackbox Exporter: HTTP health probes for each module
  # Exposed as probe_success{instance="<url>"} and probe_duration_seconds
  # Requires Blackbox Exporter running at blackbox:9115
  # @see observability/blackbox.yml for probe config
  - job_name: "module-health-blackbox"
    metrics_path: /probe
    params:
      module: [http_health]
    static_configs:
      - targets:
          - http://gateway:3001/api/health
          - http://executive-agent:8161/.well-known/agent-card.json
          - http://motor-output:8163/.well-known/agent-card.json
          - http://working-memory:8201/.well-known/agent-card.json
          - http://reasoning:8206/.well-known/agent-card.json
          - http://metacognition:8171/.well-known/agent-card.json
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
