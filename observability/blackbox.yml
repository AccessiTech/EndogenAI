# Blackbox Exporter configuration — brAIn module health probes.
# Probes each module's health endpoint via HTTP and reports probe_success.
#
# @see docs/research/phase-8c-detailed-workplan.md §8.3
modules:
  http_health:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      fail_if_body_not_matches_regexp:
        - "ok"
      preferred_ip_protocol: "ip4"
